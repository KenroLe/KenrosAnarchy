[combat]
	#If true, firing a gun pushes the player backwards.
	recoilBackstepEnabled = true
	#Global multiplier for recoil backstep force. 0.5 means half of 1.20.1-like force.
	# Default: 0.5
	# Range: 0.0 ~ 2.0
	recoilBackstepScale = 0.5
	#If true, bullets hitting a block trigger the vanilla block hit particle animation event.
	blockHitAnimationEnabled = true
	#If true, guns and installed attachments receive durability damage when a gun is fired.
	gunDurability = true
	#If true, low-durability guns can jam and fail to fire.
	gunJamming = true
	#If true, bullets can destroy hit blocks based on penetration and bullet power rules.
	bulletBlockDestructionEnabled = true
	#If true, guns that support magazine swaps will reload from compatible magazines instead of using the legacy loose-ammo reload path.
	magazineFeedEnabled = true
	#If true, ground gunners can place support blocks to get around simple terrain obstacles.
	gunnerTerrainPlacementEnabled = true
	#Block id ground gunners place as temporary terrain support.
	gunnerTerrainSupportBlock = "minecraft:dirt"
	#Maximum bulletproof tier ground gunners are allowed to break while traversing terrain. 0 = penetrable only, 2 = tier 2 and below.
	# Default: 2
	# Range: 0 ~ 3
	gunnerTerrainBreakMaxTier = 2
	#In-game day when gunner accuracy scaling starts.
	# Default: 5
	# Range: 0 ~ 5000
	gunnerAccuracyStartDay = 5
	#In-game day when gunner accuracy reaches configured max value.
	# Default: 60
	# Range: 1 ~ 5000
	gunnerAccuracyMaxDay = 60
	#Late-game gunner accuracy increase as a percent from the day-5 spread baseline. 0.70 means 70% more accurate.
	# Default: 0.7
	# Range: 0.0 ~ 0.95
	gunnerAccuracyMaxPercent = 0.7
	#Additional spread multiplier for gunner-fired shotguns. Lower = tighter pellet grouping.
	# Default: 0.82
	# Range: 0.2 ~ 1.0
	gunnerShotgunSpreadMultiplier = 0.82
	#In-game day when gunner weapon strength, armor chance, and armor tier reach their maximum.
	# Default: 60
	# Range: 1 ~ 5000
	gunnerProgressionMaxDay = 60
	#Ticks without qualifying minigun/light machine gun hits before Terror Phantom rapid-fire resistance resets.
	# Default: 25
	# Range: 1 ~ 200
	terrorPhantomRapidFireResistanceResetTicks = 25
	#Qualifying hits at the start of each burst before Terror Phantom rapid-fire resistance reduces damage.
	# Default: 10
	# Range: 0 ~ 200
	terrorPhantomRapidFireResistanceWarmupHits = 10
	#Extra damage multiplier for player minigun hits after Terror Phantom rapid-fire resistance warms up. 1.0 disables this extra resistance.
	# Default: 0.18
	# Range: 0.01 ~ 1.0
	terrorPhantomMinigunRapidFireDamageMultiplier = 0.18
	#Extra damage multiplier for player light machine gun hits after Terror Phantom rapid-fire resistance warms up. 1.0 disables this extra resistance.
	# Default: 0.35
	# Range: 0.01 ~ 1.0
	terrorPhantomLightMachineGunRapidFireDamageMultiplier = 0.35
	#Global bullet lifetime in seconds. Applies to all bullets.
	# Default: 60
	# Range: 1 ~ 3600
	bulletLifetimeSeconds = 60

[terrorRaid]
	#Seconds between Terror Raid waves.
	# Default: 18
	# Range: 3 ~ 120
	waveIntervalSeconds = 18
	#Total ground raid waves triggered by Terror Phantom death.
	# Default: 4
	# Range: 1 ~ 10
	groundWaveCount = 4
	#Total air raid waves triggered by Bound Terror Phantom death.
	# Default: 4
	# Range: 1 ~ 10
	airWaveCount = 4

[factionPatrol]
	#If true, faction patrols spawn naturally and command-spawned patrols show encounter boss bars.
	enabled = true
	#Fixed patrol interval in days. Set to 0 to use random interval ticks.
	# Default: 5
	# Range: 0 ~ 30
	intervalDays = 5
	#Minimum random patrol interval in ticks when intervalDays is 0.
	# Default: 12000
	# Range: > 1
	randomIntervalMinTicks = 12000
	#Maximum random patrol interval in ticks when intervalDays is 0.
	# Default: 24000
	# Range: > 1
	randomIntervalMaxTicks = 24000
	#Minimum in-game days before patrols can naturally spawn.
	# Default: 5
	# Range: 0 ~ 100
	minimumDays = 5
	#Range in blocks where patrol boss bars are visible.
	# Default: 64
	# Range: 16 ~ 256
	bossBarRange = 64
	#Probability (0-1) that a patrol attempt actually spawns once all other patrol conditions pass.
	# Default: 0.35
	# Range: 0.0 ~ 1.0
	spawnChance = 0.35

[factionRaid]
	#If true, faction raids can spawn naturally and by returning home with Faction Omen.
	enabled = true
	#Fixed raid interval in days. Set to 0 to use random interval ticks.
	# Default: 30
	# Range: 0 ~ 100
	intervalDays = 30
	#Minimum random raid interval in ticks when intervalDays is 0.
	# Default: 12000
	# Range: > 1
	randomIntervalMinTicks = 12000
	#Maximum random raid interval in ticks when intervalDays is 0.
	# Default: 24000
	# Range: > 1
	randomIntervalMaxTicks = 24000
	#Minimum in-game days before natural raids can spawn.
	# Default: 15
	# Range: 0 ~ 100
	minimumDays = 15
	#Radius around player's respawn point that triggers a faction raid when Faction Omen is active.
	# Default: 48
	# Range: 8 ~ 256
	homeTriggerRadius = 48

[vehicle]
	#If true, players can place vehicle assembling tables and assemble new vehicle containers.
	enabled = true
	#If true, gunner vehicles can naturally replace open-sky gunners and join faction raids.
	enemyVehicleSpawningEnabled = true
	#In-game day when enemy gunner vehicles can start spawning.
	# Default: 80
	# Range: 0 ~ 5000
	enemyVehicleStartDay = 80
	#Probability (0-1) that a newly created open-sky natural gunner converts into an enemy vehicle.
	# Default: 0.05
	# Range: 0.0 ~ 1.0
	enemyVehicleConversionChance = 0.05
